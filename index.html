<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Micor — Student Food Delivery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d0f14;
    --surface:   #161920;
    --card:      #1e222e;
    --border:    #2a2f3f;
    --accent:    #f0c040;
    --accent2:   #ff6b5b;
    --green:     #4ade80;
    --text:      #f0f0f0;
    --muted:     #7a8099;
    --radius:    14px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
  button { cursor: pointer; border: none; font-family: var(--font-body); }
  input, textarea { font-family: var(--font-body); }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: .5;
  }

  /* ── TABS ── */
  #tabs-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(22,25,32,0.97); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 0 18px; z-index: 100;
  }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; color: var(--muted);
    font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    transition: color .2s; padding: 4px 20px; position: relative;
  }
  .tab-btn svg { width: 22px; height: 22px; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn .badge {
    position: absolute; top: 0; right: 10px;
    background: var(--accent2); color: #fff;
    font-size: 9px; font-weight: 700; border-radius: 99px; padding: 1px 5px; display: none;
  }
  .tab-btn .badge.show { display: block; }

  /* ── PAGES ── */
  .page { display: none; min-height: 100vh; padding-bottom: 90px; }
  .page.active { display: block; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, #1e1a05 0%, var(--bg) 70%);
  }
  .hero-glow {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,192,64,.18) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%,-60%); pointer-events: none;
  }
  .hero-label {
    font-size: 11px; letter-spacing: .25em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 18px;
    background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.25);
    padding: 5px 14px; border-radius: 99px; animation: fadeUp .8s ease both;
  }
  .hero-title {
    font-family: var(--font-head); font-size: clamp(72px, 18vw, 160px);
    font-weight: 800; line-height: .9; letter-spacing: -.04em; color: var(--accent);
    animation: fadeUp .9s ease both .1s; position: relative; z-index: 1;
  }
  .hero-sub {
    font-size: 16px; color: var(--muted); font-weight: 300;
    margin-top: 18px; text-align: center; max-width: 320px;
    animation: fadeUp 1s ease both .2s;
  }
  .hero-sub span { color: var(--text); font-weight: 500; }
  .scroll-hint {
    position: absolute; bottom: 36px; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--muted); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    animation: fadeUp 1s ease both .5s;
  }
  .scroll-arrow {
    width: 28px; height: 28px; border: 1.5px solid var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: bounce 1.6s ease-in-out infinite;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

  /* ── SHOPS ── */
  #shops-section { padding: 56px 20px 24px; }
  .section-title {
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 28px;
  }
  .loading-shops { display: flex; flex-direction: column; gap: 14px; }
  .shop-skeleton { height: 180px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }
  .load-error { background: rgba(255,107,91,.1); border: 1px solid rgba(255,107,91,.3); border-radius: var(--radius); padding: 18px 20px; color: var(--accent2); font-size: 13px; line-height: 1.7; }
  .load-error code { background: rgba(255,107,91,.15); padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }

  /* ── SHOP CARD ── */
  .shop-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 18px; overflow: hidden; transition: border-color .25s; }
  .shop-card.open { border-color: rgba(240,192,64,.5); }
  .shop-banner-wrap { position: relative; width: 100%; height: 160px; overflow: hidden; background: var(--surface); cursor: pointer; }
  .shop-banner-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s; }
  .shop-card.open .shop-banner-wrap img { transform: scale(1.04); }
  .shop-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,15,20,.85) 0%, transparent 55%); }
  .shop-banner-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 16px; display: flex; align-items: flex-end; justify-content: space-between; }
  .shop-name { font-family: var(--font-head); font-size: 19px; font-weight: 800; color: #fff; line-height: 1.1; }
  .shop-tag { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 3px; }
  .shop-chevron { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.12); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 10px; color: #fff; transition: transform .3s, background .2s; }
  .shop-card.open .shop-chevron { transform: rotate(180deg); background: var(--accent); color: #000; }
  .shop-chevron svg { width: 16px; height: 16px; }
  .shop-menu { max-height: 0; overflow: hidden; transition: max-height .5s cubic-bezier(.4,0,.2,1); }
  .shop-card.open .shop-menu { max-height: 9999px; }
  .menu-inner { padding: 10px 14px 16px; display: flex; flex-direction: column; gap: 14px; }

  /* ── MENU ITEM ── */
  .menu-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color .2s; }
  .menu-item:hover { border-color: rgba(240,192,64,.3); }
  .menu-photo-wrap { width: 100%; height: 175px; overflow: hidden; background: #111; position: relative; }
  .menu-photo-wrap::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; z-index: 0; }
  .menu-photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 1; transition: transform .35s; }
  .menu-item:hover .menu-photo-wrap img { transform: scale(1.04); }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .menu-item-body { padding: 12px 14px 14px; }
  .menu-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .menu-item-name { font-family: var(--font-head); font-size: 15px; font-weight: 700; line-height: 1.2; }
  .menu-item-price { font-size: 16px; font-weight: 800; color: var(--accent); flex-shrink: 0; white-space: nowrap; }
  .menu-item-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }

  /* Bottom action row: [−] [qty] [+]  [Add to Cart] */
  .menu-item-actions {
    display: flex; align-items: center; gap: 10px;
  }
  .menu-qty-ctrl {
    display: flex; align-items: center; gap: 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex-shrink: 0;
  }
  .menu-qty-btn {
    width: 36px; height: 36px;
    background: none; color: var(--text);
    font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
    border: none;
  }
  .menu-qty-btn:hover { background: var(--accent); color: #000; }
  .menu-qty-num {
    font-size: 15px; font-weight: 800;
    min-width: 30px; text-align: center;
    color: var(--text); padding: 0 2px;
  }
  .menu-add-btn {
    flex: 1; background: var(--accent); color: #000;
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    padding: 10px 12px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .menu-add-btn:hover { opacity: .85; }
  .menu-add-btn:active { transform: scale(.97); }
  /* when qty > 0, button turns green "Added" state */
  .menu-add-btn.in-cart { background: var(--green); }

  /* ── CART PAGE ── */
  #cart-page { padding: 32px 20px 90px; }
  .page-title { font-family: var(--font-head); font-size: 28px; font-weight: 800; margin-bottom: 24px; letter-spacing: -.02em; }
  .page-title span { color: var(--accent); }
  .cart-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .cart-empty .big { font-size: 52px; margin-bottom: 14px; }

  /* CART ITEM */
  .cart-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .cart-item-top { display: flex; align-items: stretch; }
  .cart-item-photo { width: 100px; flex-shrink: 0; background: var(--surface); overflow: hidden; }
  .cart-item-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cart-item-info-wrap { flex: 1; padding: 12px 14px 10px; display: flex; flex-direction: column; justify-content: space-between; }
  .cart-item-name { font-family: var(--font-head); font-size: 14px; font-weight: 700; line-height: 1.2; }
  .cart-item-shop { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .cart-item-price-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .cart-item-price { font-size: 16px; font-weight: 800; color: var(--accent); }
  .cart-item-remove { background: rgba(255,107,91,.12); color: var(--accent2); font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; transition: background .15s; }
  .cart-item-remove:hover { background: rgba(255,107,91,.28); }
  /* +/- bar at bottom of cart card */
  .cart-item-qty-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px 11px; border-top: 1px solid var(--border);
    background: rgba(255,255,255,.02);
  }
  .cart-qty-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .cart-qty-ctrl { display: flex; align-items: center; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .cart-qty-btn {
    width: 36px; height: 36px; background: none; color: var(--text);
    font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .cart-qty-btn:hover { background: var(--accent); color: #000; }
  .cart-qty-num { font-size: 15px; font-weight: 800; min-width: 36px; text-align: center; color: var(--text); }

  /* SUMMARY */
  .cart-summary { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-top: 6px; }
  .cart-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); margin-bottom: 10px; }
  .cart-row.total { font-size: 19px; font-weight: 800; color: var(--text); border-top: 1px solid var(--border); padding-top: 13px; margin-top: 4px; margin-bottom: 0; }
  .cart-row.total span:last-child { color: var(--accent); }

  /* ── ORDER FORM ── */
  .order-form { margin-top: 24px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .order-form h3 { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 14px; padding: 12px 14px; outline: none; transition: border-color .2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: none; height: 72px; font-family: var(--font-body); }

  /* QR BOX */
  .qr-box {
    background: var(--surface); border: 1.5px solid rgba(240,192,64,.3);
    border-radius: 14px; padding: 20px; margin-bottom: 18px;
    display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center;
  }
  .qr-label { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: var(--accent); }
  .qr-img-wrap { width: 185px; height: 185px; border-radius: 12px; overflow: hidden; border: 2px solid rgba(240,192,64,.4); background: #fff; display: flex; align-items: center; justify-content: center; }
  .qr-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .qr-placeholder { width: 185px; height: 185px; border-radius: 12px; border: 2px dashed rgba(240,192,64,.35); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); font-size: 12px; background: var(--card); line-height: 1.5; text-align: center; padding: 16px; }
  .qr-placeholder svg { width: 48px; height: 48px; opacity: .35; }
  .qr-sublabel { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* ATTACHMENT */
  .attach-area { width: 100%; border: 1.5px dashed var(--border); border-radius: 12px; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: border-color .2s; background: var(--surface); position: relative; }
  .attach-area:hover { border-color: rgba(240,192,64,.5); }
  .attach-area.has-file { border-color: var(--green); border-style: solid; }
  .attach-area.missing { border-color: var(--accent2) !important; animation: shake .3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .attach-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .attach-icon { font-size: 30px; }
  .attach-lbl { font-size: 13px; font-weight: 600; color: var(--muted); }
  .attach-lbl.ready { color: var(--green); }
  .attach-hint { font-size: 11px; color: var(--muted); opacity: .7; }
  .attach-preview { width: 100%; max-height: 130px; border-radius: 8px; object-fit: cover; margin-top: 4px; display: none; border: 1px solid var(--border); }
  .attach-preview.show { display: block; }
  .order-btn { width: 100%; background: var(--accent); color: #000; font-family: var(--font-head); font-size: 16px; font-weight: 700; padding: 16px; border-radius: 12px; letter-spacing: .02em; transition: opacity .2s, transform .1s; margin-top: 8px; }
  .order-btn:hover { opacity: .88; }
  .order-btn:active { transform: scale(.98); }
  .order-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── HISTORY ── */
  #history-page { padding: 32px 20px 90px; }
  .history-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .history-empty .big { font-size: 52px; margin-bottom: 14px; }
  .history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
  .history-card-photos { display: flex; height: 72px; }
  .history-card-photos img { flex: 1; object-fit: cover; }
  .history-card-photos img+img { border-left: 2px solid var(--bg); }
  .history-card-body { padding: 14px 16px; }
  .history-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .history-id { font-family: var(--font-head); font-size: 13px; color: var(--accent); font-weight: 700; }
  .history-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .history-status { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; }
  .status-sent { background: rgba(74,222,128,.15); color: var(--green); }
  .history-items { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
  .history-total { font-size: 15px; font-weight: 800; margin-top: 8px; }
  .history-total span { color: var(--accent); }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #000; font-size: 13px; font-weight: 600; padding: 10px 22px; border-radius: 99px; opacity: 0; transition: opacity .3s, transform .3s; z-index: 200; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--accent2); color: #fff; }

  /* ── SUCCESS ── */
  #success-overlay { display: none; position: fixed; inset: 0; background: rgba(13,15,20,.96); z-index: 300; align-items: center; justify-content: center; flex-direction: column; gap: 16px; text-align: center; padding: 40px; }
  #success-overlay.show { display: flex; animation: fadeUp .4s ease; }
  .success-icon { font-size: 72px; }
  .success-title { font-family: var(--font-head); font-size: 32px; font-weight: 800; color: var(--green); }
  .success-msg { font-size: 15px; color: var(--muted); max-width: 280px; line-height: 1.6; }
  .success-close { margin-top: 10px; background: var(--accent); color: #000; font-family: var(--font-head); font-size: 14px; font-weight: 700; padding: 14px 36px; border-radius: 12px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="success-overlay">
  <div class="success-icon">🎉</div>
  <div class="success-title">Order Sent!</div>
  <div class="success-msg">Your order and payment screenshot have been submitted. A student runner will reach out on WhatsApp shortly!</div>
  <button class="success-close" onclick="closeSuccess()">Back to Home</button>
</div>

<!-- TABS -->
<div id="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('home')" id="tab-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/>
    </svg>
    Home
  </button>
  <button class="tab-btn" onclick="switchTab('cart')" id="tab-cart">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    Cart
    <span class="badge" id="cart-badge">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('history')" id="tab-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    History
  </button>
</div>

<!-- HOME -->
<div class="page active" id="home-page">
  <section id="hero">
    <div class="hero-glow"></div>
    <div class="hero-label">🛵 Student Delivery Services</div>
    <div class="hero-title">Micor</div>
    <div class="hero-sub">Order food. <span>Delivered to you.</span></div>
    <div class="scroll-hint">
      <div class="scroll-arrow">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4l4 4 4-4"/></svg>
      </div>
      scroll to browse
    </div>
  </section>
  <section id="shops-section">
    <div class="section-title">🍽 Food Shops</div>
    <div id="shops-list">
      <div class="loading-shops">
        <div class="shop-skeleton"></div>
        <div class="shop-skeleton"></div>
        <div class="shop-skeleton"></div>
      </div>
    </div>
  </section>
</div>

<!-- CART -->
<div class="page" id="cart-page">
  <div class="page-title">Your <span>Cart</span></div>
  <div id="cart-content"></div>
</div>

<!-- HISTORY -->
<div class="page" id="history-page">
  <div class="page-title">Order <span>History</span></div>
  <div id="history-content"></div>
</div>

<script>
// ════════════════════════════════════════════════
//  ⚠️  YOUR DISCORD WEBHOOK URL
// ════════════════════════════════════════════════
const DISCORD_WEBHOOK = "YOUR_DISCORD_WEBHOOK_URL";

// ════════════════════════════════════════════════
//  ⚠️  YOUR QR CODE IMAGE (path or https:// URL)
// ════════════════════════════════════════════════
const QR_IMAGE = "";

// ═══════════════ STATE ══════════════════════════
let shops       = [];
let cart        = JSON.parse(localStorage.getItem('micor_cart')    || '[]');
let orderHist   = JSON.parse(localStorage.getItem('micor_history') || '[]');
let paymentFile = null;

function saveCart()    { localStorage.setItem('micor_cart',    JSON.stringify(cart)); }
function saveHistory() { localStorage.setItem('micor_history', JSON.stringify(orderHist)); }

// ═══════════════ LOAD JSON ══════════════════════
async function loadShops() {
  try {
    const res = await fetch('shops.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    shops = await res.json();
    renderShops();
  } catch {
    document.getElementById('shops-list').innerHTML =
      `<div class="load-error">⚠️ Could not load <code>shops.json</code>.<br><br>
       Open the folder with <strong>VS Code Live Server</strong> or run <code>npx serve .</code> — do not double-click the HTML file.</div>`;
  }
}

// ═══════════════ TABS ═══════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab + '-page').classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'cart')    renderCart();
  if (tab === 'history') renderHistory();
  window.scrollTo(0, 0);
}

// ═══════════════ RENDER SHOPS ═══════════════════
function renderShops() {
  const container = document.getElementById('shops-list');
  if (!shops.length) {
    container.innerHTML = `<div class="load-error">⚠️ <code>shops.json</code> is empty.</div>`;
    return;
  }
  container.innerHTML = shops.map(shop => `
    <div class="shop-card" id="shop-${shop.id}">
      <div class="shop-banner-wrap" onclick="toggleShop('${shop.id}')">
        <img src="${shop.image}" alt="${shop.name}" loading="lazy" />
        <div class="shop-banner-overlay"></div>
        <div class="shop-banner-info">
          <div>
            <div class="shop-name">${shop.name}</div>
            <div class="shop-tag">${shop.tag}</div>
          </div>
          <div class="shop-chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        </div>
      </div>
      <div class="shop-menu" id="menu-${shop.id}">
        <div class="menu-inner" id="menu-inner-${shop.id}"></div>
      </div>
    </div>
  `).join('');

  // Render menu items using JS (avoids any inline-attribute quoting issues)
  shops.forEach(shop => {
    const inner = document.getElementById('menu-inner-' + shop.id);
    if (!inner) return;
    (shop.menu || []).forEach(item => {
      inner.appendChild(buildMenuItemEl(shop, item));
    });
  });
}

function buildMenuItemEl(shop, item) {
  const ci = cart.find(c => c.itemId === item.id);
  const qty = ci ? ci.qty : 0;

  const wrapper = document.createElement('div');
  wrapper.className = 'menu-item';
  wrapper.id = 'mi-' + item.id;

  // Photo
  const photoWrap = document.createElement('div');
  photoWrap.className = 'menu-photo-wrap';
  const img = document.createElement('img');
  img.src = item.image || '';
  img.alt = item.name;
  img.loading = 'lazy';
  photoWrap.appendChild(img);

  // Body
  const body = document.createElement('div');
  body.className = 'menu-item-body';

  // Top row
  const top = document.createElement('div');
  top.className = 'menu-item-top';
  const nameEl = document.createElement('div');
  nameEl.className = 'menu-item-name';
  nameEl.textContent = item.name;
  const priceEl = document.createElement('div');
  priceEl.className = 'menu-item-price';
  priceEl.textContent = 'RM ' + Number(item.price).toFixed(2);
  top.appendChild(nameEl);
  top.appendChild(priceEl);

  // Desc
  const desc = document.createElement('div');
  desc.className = 'menu-item-desc';
  desc.textContent = item.desc;

  // Actions row: [−][qty][+]  [Add to Cart]
  const actions = document.createElement('div');
  actions.className = 'menu-item-actions';

  // Qty control
  const qtyCtrl = document.createElement('div');
  qtyCtrl.className = 'menu-qty-ctrl';

  const btnMinus = document.createElement('button');
  btnMinus.className = 'menu-qty-btn';
  btnMinus.textContent = '−';
  btnMinus.addEventListener('click', () => menuAdjustQty(shop, item, -1));

  const qtyNum = document.createElement('span');
  qtyNum.className = 'menu-qty-num';
  qtyNum.id = 'mqty-' + item.id;
  qtyNum.textContent = qty;

  const btnPlus = document.createElement('button');
  btnPlus.className = 'menu-qty-btn';
  btnPlus.textContent = '+';
  btnPlus.addEventListener('click', () => menuAdjustQty(shop, item, 1));

  qtyCtrl.appendChild(btnMinus);
  qtyCtrl.appendChild(qtyNum);
  qtyCtrl.appendChild(btnPlus);

  // Add to Cart button
  const addBtn = document.createElement('button');
  addBtn.className = 'menu-add-btn' + (qty > 0 ? ' in-cart' : '');
  addBtn.id = 'madd-' + item.id;
  addBtn.innerHTML = qty > 0
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> In Cart`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Add to Cart`;
  addBtn.addEventListener('click', () => menuAddToCart(shop, item));

  actions.appendChild(qtyCtrl);
  actions.appendChild(addBtn);

  body.appendChild(top);
  body.appendChild(desc);
  body.appendChild(actions);
  wrapper.appendChild(photoWrap);
  wrapper.appendChild(body);
  return wrapper;
}

function toggleShop(id) {
  const target  = document.getElementById('shop-' + id);
  const isOpen  = target.classList.contains('open');

  // Close any other open shop — lock scroll position so the page doesn't jump
  document.querySelectorAll('.shop-card.open').forEach(card => {
    if (card.id !== 'shop-' + id) {
      const scrollY = window.scrollY;
      card.classList.remove('open');
      // After removing the class, the menu collapses and page height shrinks.
      // Force the scroll position to stay exactly where it was.
      window.scrollTo({ top: scrollY, behavior: 'instant' });
    }
  });

  // Toggle the tapped shop
  if (!isOpen) {
    target.classList.add('open');
  } else {
    const scrollY = window.scrollY;
    target.classList.remove('open');
    window.scrollTo({ top: scrollY, behavior: 'instant' });
  }
}

// ═══════════════ MENU QTY LOGIC ═════════════════
// + / − on menu card adjusts qty but does NOT add to cart until "Add to Cart" is tapped
// If already in cart, +/− update cart directly
function menuAdjustQty(shop, item, delta) {
  const ci = cart.find(c => c.itemId === item.id);

  if (ci) {
    // Already in cart — update directly
    ci.qty += delta;
    if (ci.qty <= 0) {
      cart.splice(cart.indexOf(ci), 1);
    }
    saveCart(); updateBadge(); refreshMenuItemUI(item.id);
    refreshCartItemUI(item.id);
  } else {
    // Not in cart yet — just update the displayed qty number
    const qtyEl = document.getElementById('mqty-' + item.id);
    if (!qtyEl) return;
    let pending = parseInt(qtyEl.textContent) || 0;
    pending = Math.max(0, pending + delta);
    qtyEl.textContent = pending;
  }
}

function menuAddToCart(shop, item) {
  const qtyEl = document.getElementById('mqty-' + item.id);
  const pending = parseInt(qtyEl?.textContent) || 0;
  const qty = pending > 0 ? pending : 1;

  const ci = cart.find(c => c.itemId === item.id);
  if (ci) {
    // Already in cart — just sync qty
    ci.qty = qty;
    saveCart(); updateBadge(); refreshMenuItemUI(item.id);
    showToast('Cart updated ✓');
  } else {
    cart.push({
      shopId: shop.id,
      itemId: item.id,
      shopName: shop.name,
      itemName: item.name,
      price: Number(item.price),
      image: item.image || '',
      qty
    });
    saveCart(); updateBadge(); refreshMenuItemUI(item.id);
    showToast('Added to cart 🛒');
  }
}

function refreshMenuItemUI(itemId) {
  const ci    = cart.find(c => c.itemId === itemId);
  const qty   = ci ? ci.qty : 0;
  const qtyEl = document.getElementById('mqty-' + itemId);
  const addEl = document.getElementById('madd-' + itemId);
  if (qtyEl) qtyEl.textContent = qty;
  if (addEl) {
    addEl.className = 'menu-add-btn' + (qty > 0 ? ' in-cart' : '');
    addEl.innerHTML = qty > 0
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> In Cart`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg> Add to Cart`;
  }
}

// ═══════════════ CART RENDER ════════════════════
function renderCart() {
  paymentFile = null;
  const container = document.getElementById('cart-content');
  if (!cart.length) {
    container.innerHTML = `<div class="cart-empty"><div class="big">🛒</div><p>Your cart is empty.<br>Browse shops and add items!</p></div>`;
    return;
  }
  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const delivery = 1.50;
  const total    = subtotal + delivery;

  const qrSection = QR_IMAGE
    ? `<div class="qr-img-wrap"><img src="${QR_IMAGE}" alt="Payment QR" /></div>`
    : `<div class="qr-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"/>
        </svg>
        Set <strong>QR_IMAGE</strong> in the HTML file
      </div>`;

  container.innerHTML = `
    ${cart.map(ci => `
      <div class="cart-item" id="cart-item-${ci.itemId}">
        <div class="cart-item-top">
          <div class="cart-item-photo">
            <img src="${ci.image}" alt="${ci.itemName}" loading="lazy" />
          </div>
          <div class="cart-item-info-wrap">
            <div>
              <div class="cart-item-name">${ci.itemName}</div>
              <div class="cart-item-shop">${ci.shopName}</div>
            </div>
            <div class="cart-item-price-row">
              <div class="cart-item-price" id="cart-price-${ci.itemId}">RM ${(ci.price * ci.qty).toFixed(2)}</div>
              <button class="cart-item-remove" data-id="${ci.itemId}">Remove</button>
            </div>
          </div>
        </div>
        <div class="cart-item-qty-bar">
          <span class="cart-qty-label">Quantity</span>
          <div class="cart-qty-ctrl">
            <button class="cart-qty-btn" data-id="${ci.itemId}" data-delta="-1">−</button>
            <span class="cart-qty-num" id="cart-qty-${ci.itemId}">${ci.qty}</span>
            <button class="cart-qty-btn" data-id="${ci.itemId}" data-delta="1">+</button>
          </div>
        </div>
      </div>
    `).join('')}

    <div class="cart-summary">
      <div class="cart-row"><span>Subtotal</span><span id="cart-subtotal">RM ${subtotal.toFixed(2)}</span></div>
      <div class="cart-row"><span>Runner Fee</span><span>RM 1.50</span></div>
      <div class="cart-row total"><span>Total</span><span id="cart-total">RM ${total.toFixed(2)}</span></div>
    </div>

    <div class="order-form">
      <h3>📋 Your Details</h3>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="order-name" placeholder="e.g. Ahmad Zulkifli" />
      </div>
      <div class="form-group">
        <label>WhatsApp Number</label>
        <input type="tel" id="order-wa" placeholder="e.g. 0123456789" />
      </div>
      <div class="form-group">
        <label>Delivery Location</label>
        <input type="text" id="order-loc" placeholder="e.g. Block A Room 312 / Library" />
      </div>
      <div class="form-group">
        <label>Note to Runner (optional)</label>
        <textarea id="order-note" placeholder="e.g. No spicy, extra sauce..."></textarea>
      </div>

      <div class="qr-box">
        <div class="qr-label">💳 Pay Before Ordering</div>
        ${qrSection}
        <div class="qr-sublabel">
          Transfer <strong style="color:var(--accent)" id="qr-amt">RM ${total.toFixed(2)}</strong> to this QR,<br>
          then attach your payment screenshot below.
        </div>
      </div>

      <div class="form-group">
        <label>Payment Screenshot</label>
        <div class="attach-area" id="attach-area">
          <input type="file" id="file-input" accept="image/*" />
          <div class="attach-icon">📎</div>
          <div class="attach-lbl" id="attach-lbl">Tap to attach screenshot</div>
          <div class="attach-hint">JPG, PNG or HEIC accepted</div>
          <img class="attach-preview" id="attach-preview" alt="preview" />
        </div>
      </div>

      <button class="order-btn" id="order-btn">🚀 Place Order</button>
    </div>
  `;

  // Bind events via JS (no inline onclick — avoids all quoting issues)
  document.querySelectorAll('.cart-item-remove').forEach(btn => {
    btn.addEventListener('click', () => removeFromCart(btn.dataset.id));
  });
  document.querySelectorAll('.cart-qty-btn').forEach(btn => {
    btn.addEventListener('click', () => cartChangeQty(btn.dataset.id, parseInt(btn.dataset.delta)));
  });
  document.getElementById('file-input').addEventListener('change', handleAttachment);
  document.getElementById('order-btn').addEventListener('click', placeOrder);
}

// ═══════════════ CART QTY ═══════════════════════
function cartChangeQty(itemId, delta) {
  const idx = cart.findIndex(c => c.itemId === itemId);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) {
    cart.splice(idx, 1);
    saveCart(); updateBadge(); refreshMenuItemUI(itemId);
    renderCart(); // re-render since item is gone
    return;
  }
  saveCart(); updateBadge();
  refreshMenuItemUI(itemId);
  refreshCartItemUI(itemId);
}

function refreshCartItemUI(itemId) {
  const ci = cart.find(c => c.itemId === itemId);
  if (!ci) return;
  const qtyEl   = document.getElementById('cart-qty-'   + itemId);
  const priceEl = document.getElementById('cart-price-' + itemId);
  if (qtyEl)   qtyEl.textContent   = ci.qty;
  if (priceEl) priceEl.textContent = 'RM ' + (ci.price * ci.qty).toFixed(2);
  updateCartTotals();
}

function removeFromCart(itemId) {
  cart = cart.filter(c => c.itemId !== itemId);
  saveCart(); updateBadge(); refreshMenuItemUI(itemId); renderCart();
}

function updateBadge() {
  const n = cart.reduce((s, c) => s + c.qty, 0);
  const b = document.getElementById('cart-badge');
  b.textContent = n;
  b.classList.toggle('show', n > 0);
}

function updateCartTotals() {
  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const total    = subtotal + 1.50;
  const subEl = document.getElementById('cart-subtotal');
  const totEl = document.getElementById('cart-total');
  const amtEl = document.getElementById('qr-amt');
  if (subEl) subEl.textContent = 'RM ' + subtotal.toFixed(2);
  if (totEl) totEl.textContent = 'RM ' + total.toFixed(2);
  if (amtEl) amtEl.textContent = 'RM ' + total.toFixed(2);
}

// ═══════════════ ATTACHMENT ═════════════════════
function handleAttachment(e) {
  const file = e.target.files[0];
  if (!file) return;
  paymentFile = file;
  const area    = document.getElementById('attach-area');
  const lbl     = document.getElementById('attach-lbl');
  const preview = document.getElementById('attach-preview');
  area.classList.add('has-file');
  area.classList.remove('missing');
  lbl.textContent = '✅ ' + file.name;
  lbl.classList.add('ready');
  const reader = new FileReader();
  reader.onload = ev => { preview.src = ev.target.result; preview.classList.add('show'); };
  reader.readAsDataURL(file);
}

// ═══════════════ PLACE ORDER ════════════════════
async function placeOrder() {
  const name = document.getElementById('order-name')?.value.trim();
  const wa   = document.getElementById('order-wa')?.value.trim();
  const loc  = document.getElementById('order-loc')?.value.trim();
  const note = document.getElementById('order-note')?.value.trim();

  if (!name) { showToast('Please enter your name ✏️', true); return; }
  if (!wa)   { showToast('Please enter your WhatsApp number 📱', true); return; }
  if (!loc)  { showToast('Please enter your delivery location 📍', true); return; }
  if (!paymentFile) {
    showToast('Please attach your payment screenshot 📸', true);
    const area = document.getElementById('attach-area');
    if (area) { area.classList.add('missing'); setTimeout(() => area.classList.remove('missing'), 1500); }
    return;
  }

  const btn = document.getElementById('order-btn');
  btn.disabled = true; btn.textContent = '⏳ Sending...';

  const subtotal  = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const total     = subtotal + 1.50;
  const orderId   = 'MIC-' + Date.now().toString(36).toUpperCase();
  const itemsList = cart.map(c => `• ${c.itemName} ×${c.qty} — RM ${(c.price*c.qty).toFixed(2)} (${c.shopName})`).join('\n');

  try {
    if (DISCORD_WEBHOOK !== "YOUR_DISCORD_WEBHOOK_URL") {
      await fetch(DISCORD_WEBHOOK, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: "Micor Orders 🛵",
          embeds: [{
            title: `🆕 New Order — ${orderId}`,
            color: 0xf0c040,
            fields: [
              { name: "👤 Student Name",             value: name,                     inline: true  },
              { name: "📱 WhatsApp",                 value: wa,                       inline: true  },
              { name: "📍 Delivery Location",        value: loc,                      inline: false },
              { name: "🛒 Items Ordered",            value: itemsList,                inline: false },
              { name: "💰 Total (incl. runner fee)", value: `RM ${total.toFixed(2)}`, inline: true  },
              ...(note ? [{ name: "📝 Note", value: note, inline: false }] : [])
            ],
            footer: { text: `Micor Student Delivery • ${new Date().toLocaleString()}` }
          }]
        })
      });
      const form = new FormData();
      form.append('file', paymentFile, `payment-${orderId}.${paymentFile.name.split('.').pop()}`);
      form.append('payload_json', JSON.stringify({
        username: "Micor Orders 🛵",
        content: `💳 **Payment screenshot** for **${orderId}** — ${name} (${wa})`
      }));
      await fetch(DISCORD_WEBHOOK, { method: 'POST', body: form });
    } else {
      await new Promise(r => setTimeout(r, 900));
    }

    orderHist.unshift({ id: orderId, date: new Date().toLocaleString(), name, wa, loc, note, items: cart.map(c => ({...c})), total });
    saveHistory();
    cart = []; paymentFile = null;
    saveCart(); updateBadge();
    // Reset all menu item UIs
    shops.forEach(s => (s.menu || []).forEach(i => refreshMenuItemUI(i.id)));
    document.getElementById('success-overlay').classList.add('show');
  } catch (err) {
    console.error(err);
    showToast('Failed to send. Try again!', true);
    btn.disabled = false; btn.textContent = '🚀 Place Order';
  }
}

function closeSuccess() {
  document.getElementById('success-overlay').classList.remove('show');
  switchTab('home');
}

// ═══════════════ HISTORY ════════════════════════
function renderHistory() {
  const container = document.getElementById('history-content');
  if (!orderHist.length) {
    container.innerHTML = `<div class="history-empty"><div class="big">📦</div><p>No orders yet.<br>Place your first order!</p></div>`;
    return;
  }
  container.innerHTML = orderHist.map(h => {
    const imgs = h.items.slice(0, 4).map(i =>
      i.image ? `<img src="${i.image}" alt="${i.itemName}" loading="lazy" />` : ''
    ).filter(Boolean).join('');
    return `
      <div class="history-card">
        ${imgs ? `<div class="history-card-photos">${imgs}</div>` : ''}
        <div class="history-card-body">
          <div class="history-top">
            <div>
              <div class="history-id">${h.id}</div>
              <div class="history-date">${h.date}</div>
            </div>
            <div class="history-status status-sent">Sent ✓</div>
          </div>
          <div class="history-items">${h.items.map(i => `${i.itemName} ×${i.qty}`).join(' · ')}</div>
          <div class="history-total">Total paid: <span>RM ${h.total.toFixed(2)}</span></div>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════ TOAST ══════════════════════════
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 2400);
}

// ═══════════════ INIT ═══════════════════════════
loadShops();
updateBadge();
</script>
</body>
</html>
