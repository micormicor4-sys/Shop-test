<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Micor — Student Food Delivery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d0f14;
    --surface:   #161920;
    --card:      #1e222e;
    --border:    #2a2f3f;
    --accent:    #f0c040;
    --accent2:   #ff6b5b;
    --green:     #4ade80;
    --text:      #f0f0f0;
    --muted:     #7a8099;
    --radius:    14px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
  button { cursor: pointer; border: none; font-family: var(--font-body); }
  input, textarea { font-family: var(--font-body); }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: .5;
  }

  /* ── TABS ── */
  #tabs-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(22,25,32,0.97); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 0 18px; z-index: 100;
  }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; color: var(--muted);
    font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    transition: color .2s; padding: 4px 20px; position: relative;
  }
  .tab-btn svg { width: 22px; height: 22px; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn .badge {
    position: absolute; top: 0; right: 12px;
    background: var(--accent2); color: #fff;
    font-size: 9px; font-weight: 700; border-radius: 99px; padding: 1px 5px; display: none;
  }
  .tab-btn .badge.show { display: block; }

  /* ── PAGES ── */
  .page { display: none; min-height: 100vh; padding-bottom: 90px; }
  .page.active { display: block; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, #1e1a05 0%, var(--bg) 70%);
  }
  .hero-glow {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,192,64,.18) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%,-60%); pointer-events: none;
  }
  .hero-label {
    font-size: 11px; letter-spacing: .25em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 18px;
    background: rgba(240,192,64,.1); border: 1px solid rgba(240,192,64,.25);
    padding: 5px 14px; border-radius: 99px; animation: fadeUp .8s ease both;
  }
  .hero-title {
    font-family: var(--font-head); font-size: clamp(72px, 18vw, 160px);
    font-weight: 800; line-height: .9; letter-spacing: -.04em; color: var(--accent);
    animation: fadeUp .9s ease both .1s; position: relative; z-index: 1;
  }
  .hero-sub {
    font-size: 16px; color: var(--muted); font-weight: 300;
    margin-top: 18px; text-align: center; max-width: 320px;
    animation: fadeUp 1s ease both .2s;
  }
  .hero-sub span { color: var(--text); font-weight: 500; }
  .scroll-hint {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--muted); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    animation: fadeUp 1s ease both .5s;
  }
  .scroll-arrow {
    width: 28px; height: 28px; border: 1.5px solid var(--border); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: bounce 1.6s ease-in-out infinite;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

  /* ── SHOPS SECTION ── */
  #shops-section { padding: 56px 20px 24px; }
  .section-title {
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 28px;
  }
  .loading-shops { display: flex; flex-direction: column; gap: 14px; }
  .shop-skeleton {
    height: 110px; background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  .load-error {
    background: rgba(255,107,91,.1); border: 1px solid rgba(255,107,91,.3);
    border-radius: var(--radius); padding: 18px 20px;
    color: var(--accent2); font-size: 13px; line-height: 1.7;
  }
  .load-error code { background: rgba(255,107,91,.15); padding: 1px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }

  /* ── SHOP CARD ── */
  .shop-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; transition: border-color .2s;
  }
  .shop-card.open { border-color: rgba(240,192,64,.45); }
  .shop-banner { width: 100%; height: 140px; object-fit: cover; display: block; background: var(--surface); }
  .shop-header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; cursor: pointer; user-select: none;
  }
  .shop-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .shop-info { flex: 1; }
  .shop-name { font-family: var(--font-head); font-size: 17px; font-weight: 700; }
  .shop-tag { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .shop-chevron { width: 20px; height: 20px; color: var(--muted); transition: transform .3s; flex-shrink: 0; }
  .shop-card.open .shop-chevron { transform: rotate(180deg); }
  .shop-menu { max-height: 0; overflow: hidden; transition: max-height .45s cubic-bezier(.4,0,.2,1); }
  .shop-card.open .shop-menu { max-height: 9999px; }
  .menu-inner { padding: 6px 14px 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── MENU ITEM CARD ── */
  .menu-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; transition: border-color .2s;
  }
  .menu-item:hover { border-color: rgba(240,192,64,.3); }

  /* big food photo */
  .menu-item-photo {
    width: 100%; height: 160px; object-fit: cover; display: block;
    background: var(--card);
  }
  .menu-item-photo-fallback {
    width: 100%; height: 160px; display: flex; align-items: center;
    justify-content: center; font-size: 56px; background: var(--card);
  }

  .menu-item-body { padding: 12px 14px; }
  .menu-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .menu-item-name { font-family: var(--font-head); font-size: 15px; font-weight: 700; line-height: 1.2; }
  .menu-item-price { font-size: 15px; font-weight: 800; color: var(--accent); flex-shrink: 0; }
  .menu-item-desc { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.5; }

  .menu-item-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; gap: 10px;
  }
  /* qty control — only shown after first add */
  .qty-ctrl {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px 8px;
  }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--border); color: var(--text);
    font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; transition: background .15s;
  }
  .qty-btn:hover { background: var(--accent); color: #000; }
  .qty-val { font-size: 14px; font-weight: 700; min-width: 18px; text-align: center; }

  /* Add to cart button */
  .add-btn {
    flex: 1; background: var(--accent); color: #000;
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    padding: 10px 14px; border-radius: 10px; letter-spacing: .02em;
    transition: opacity .2s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-btn:hover { opacity: .88; }
  .add-btn:active { transform: scale(.97); }
  /* once item is in cart, show only qty ctrl */
  .menu-item-actions.in-cart .add-btn { display: none; }
  .menu-item-actions:not(.in-cart) .qty-ctrl { display: none; }

  /* ── CART PAGE ── */
  #cart-page { padding: 32px 20px 90px; }
  .page-title { font-family: var(--font-head); font-size: 28px; font-weight: 800; margin-bottom: 24px; letter-spacing: -.02em; }
  .page-title span { color: var(--accent); }
  .cart-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .cart-empty .big { font-size: 52px; margin-bottom: 14px; }

  /* cart item — no +/- just info and remove */
  .cart-item {
    display: flex; align-items: stretch; gap: 0;
    margin-bottom: 10px; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  .cart-item-img { width: 76px; flex-shrink: 0; background: var(--surface); }
  .cart-item-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cart-item-img .fb { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .cart-item-body { flex: 1; padding: 12px 12px; display: flex; align-items: center; gap: 10px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 13px; font-weight: 600; }
  .cart-item-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .cart-item-price { font-size: 14px; font-weight: 700; color: var(--accent); }
  .cart-item-remove { background: rgba(255,107,91,.12); color: var(--accent2); font-size: 12px; font-weight: 600; padding: 4px 9px; border-radius: 6px; transition: background .15s; }
  .cart-item-remove:hover { background: rgba(255,107,91,.25); }

  .cart-summary { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-top: 20px; }
  .cart-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); margin-bottom: 10px; }
  .cart-row.total { font-size: 18px; font-weight: 700; color: var(--text); border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
  .cart-row.total span:last-child { color: var(--accent); }

  /* ── ORDER FORM ── */
  .order-form { margin-top: 24px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .order-form h3 { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .form-group input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 12px 14px; outline: none; transition: border-color .2s; }
  .form-group input:focus { border-color: var(--accent); }
  .form-group textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 12px 14px; outline: none; transition: border-color .2s; resize: none; height: 72px; font-family: var(--font-body); }
  .form-group textarea:focus { border-color: var(--accent); }

  /* QR PAYMENT BOX */
  .qr-box {
    background: var(--surface); border: 1px solid rgba(240,192,64,.3);
    border-radius: 14px; padding: 20px; margin-bottom: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    text-align: center;
  }
  .qr-label {
    font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--accent);
  }
  .qr-sublabel { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .qr-img-wrap {
    width: 180px; height: 180px; border-radius: 12px; overflow: hidden;
    border: 2px solid rgba(240,192,64,.35); background: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .qr-img-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
  /* placeholder QR when no image set */
  .qr-placeholder {
    width: 180px; height: 180px; border-radius: 12px;
    border: 2px dashed rgba(240,192,64,.4);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--muted); font-size: 12px; background: var(--card);
  }
  .qr-placeholder svg { width: 52px; height: 52px; opacity: .4; }

  /* ATTACHMENT BUTTON */
  .attach-area {
    width: 100%; border: 1.5px dashed var(--border); border-radius: 12px;
    padding: 18px; display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: border-color .2s; background: var(--surface);
    position: relative;
  }
  .attach-area:hover { border-color: var(--accent); }
  .attach-area.has-file { border-color: var(--green); border-style: solid; }
  .attach-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .attach-icon { font-size: 28px; }
  .attach-label { font-size: 13px; font-weight: 600; color: var(--muted); }
  .attach-label.ready { color: var(--green); }
  .attach-preview {
    width: 100%; max-height: 120px; border-radius: 8px; object-fit: cover;
    display: none; border: 1px solid var(--border);
  }
  .attach-preview.show { display: block; }

  .order-btn {
    width: 100%; background: var(--accent); color: #000;
    font-family: var(--font-head); font-size: 16px; font-weight: 700;
    padding: 16px; border-radius: 12px; letter-spacing: .02em;
    transition: opacity .2s, transform .1s; margin-top: 6px;
  }
  .order-btn:hover { opacity: .88; }
  .order-btn:active { transform: scale(.98); }
  .order-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── HISTORY ── */
  #history-page { padding: 32px 20px 90px; }
  .history-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .history-empty .big { font-size: 52px; margin-bottom: 14px; }
  .history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; }
  .history-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .history-id { font-family: var(--font-head); font-size: 13px; color: var(--accent); font-weight: 700; }
  .history-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .history-status { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; }
  .status-sent { background: rgba(74,222,128,.15); color: var(--green); }
  .history-thumbs { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .history-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: var(--surface); border: 1px solid var(--border); }
  .history-thumb-emoji { width: 44px; height: 44px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .history-items { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .history-total { font-size: 15px; font-weight: 700; margin-top: 8px; }
  .history-total span { color: var(--accent); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #000; font-size: 13px; font-weight: 600;
    padding: 10px 22px; border-radius: 99px;
    opacity: 0; transition: opacity .3s, transform .3s; z-index: 200; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--accent2); color: #fff; }

  /* ── SUCCESS OVERLAY ── */
  #success-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(13,15,20,.95); z-index: 300;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; text-align: center; padding: 40px;
  }
  #success-overlay.show { display: flex; animation: fadeUp .4s ease; }
  .success-icon { font-size: 72px; }
  .success-title { font-family: var(--font-head); font-size: 32px; font-weight: 800; color: var(--green); }
  .success-msg { font-size: 15px; color: var(--muted); max-width: 280px; }
  .success-close { margin-top: 10px; background: var(--accent); color: #000; font-family: var(--font-head); font-size: 14px; font-weight: 700; padding: 14px 36px; border-radius: 12px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="success-overlay">
  <div class="success-icon">🎉</div>
  <div class="success-title">Order Sent!</div>
  <div class="success-msg">Your order and payment screenshot have been submitted. A student runner will pick it up shortly!</div>
  <button class="success-close" onclick="closeSuccess()">Back to Home</button>
</div>

<!-- TABS -->
<div id="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('home')" id="tab-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/>
    </svg>
    Home
  </button>
  <button class="tab-btn" onclick="switchTab('cart')" id="tab-cart">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    Cart
    <span class="badge" id="cart-badge">0</span>
  </button>
  <button class="tab-btn" onclick="switchTab('history')" id="tab-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    History
  </button>
</div>

<!-- HOME -->
<div class="page active" id="home-page">
  <section id="hero">
    <div class="hero-glow"></div>
    <div class="hero-label">🎓 Students Only</div>
    <div class="hero-title">Micor</div>
    <div class="hero-sub">Order food. <span>Earn by delivering.</span><br>Built by students, for students.</div>
    <div class="scroll-hint">
      <div class="scroll-arrow">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4l4 4 4-4"/></svg>
      </div>
      scroll to browse
    </div>
  </section>
  <section id="shops-section">
    <div class="section-title">🍽 Food Shops</div>
    <div id="shops-list">
      <div class="loading-shops">
        <div class="shop-skeleton"></div>
        <div class="shop-skeleton"></div>
        <div class="shop-skeleton"></div>
      </div>
    </div>
  </section>
</div>

<!-- CART -->
<div class="page" id="cart-page">
  <div class="page-title">Your <span>Cart</span></div>
  <div id="cart-content"></div>
</div>

<!-- HISTORY -->
<div class="page" id="history-page">
  <div class="page-title">Order <span>History</span></div>
  <div id="history-content"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  ⚠️  PASTE YOUR DISCORD WEBHOOK URL BELOW
// ════════════════════════════════════════════════════════
const DISCORD_WEBHOOK = "YOUR_DISCORD_WEBHOOK_URL";

// ════════════════════════════════════════════════════════
//  ⚠️  PASTE YOUR QR CODE IMAGE URL/PATH BELOW
//      e.g. "images/qr.png"  or a full https:// URL
// ════════════════════════════════════════════════════════
const QR_IMAGE = "";   // ← put your QR image path here

// ════════════════════════════════════════════════════════

let shops   = [];
let cart    = JSON.parse(localStorage.getItem('micor_cart')    || '[]');
let history = JSON.parse(localStorage.getItem('micor_history') || '[]');
let paymentFile = null;   // holds the attached screenshot File object

function saveCart()    { localStorage.setItem('micor_cart',    JSON.stringify(cart)); }
function saveHistory() { localStorage.setItem('micor_history', JSON.stringify(history)); }

/* ── LOAD shops.json ── */
async function loadShops() {
  try {
    const res = await fetch('shops.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    shops = await res.json();
    renderShops();
  } catch {
    document.getElementById('shops-list').innerHTML = `
      <div class="load-error">
        ⚠️ Could not load <code>shops.json</code>.<br><br>
        Make sure both files are in the <strong>same folder</strong> and open via
        VS Code Live Server or <code>npx serve .</code>
      </div>`;
  }
}

/* ── TABS ── */
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab + '-page').classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'cart')    renderCart();
  if (tab === 'history') renderHistory();
  window.scrollTo(0, 0);
}

/* ── RENDER SHOPS ── */
function renderShops() {
  const container = document.getElementById('shops-list');
  if (!shops.length) {
    container.innerHTML = `<div class="load-error">⚠️ <code>shops.json</code> is empty.</div>`;
    return;
  }
  container.innerHTML = shops.map(shop => `
    <div class="shop-card" id="shop-${shop.id}">
      ${shop.image ? `<img class="shop-banner" src="${shop.image}" alt="${shop.name}" onerror="this.style.display='none'" />` : ''}
      <div class="shop-header" onclick="toggleShop('${shop.id}')">
        <div class="shop-icon" style="background:${shop.color}22;border:1px solid ${shop.color}44;">${shop.icon}</div>
        <div class="shop-info">
          <div class="shop-name">${shop.name}</div>
          <div class="shop-tag">${shop.tag}</div>
        </div>
        <svg class="shop-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="shop-menu" id="menu-${shop.id}">
        <div class="menu-inner">
          ${(shop.menu || []).map(item => buildMenuItemHTML(shop, item)).join('')}
        </div>
      </div>
    </div>
  `).join('');
  syncMenuStates();
}

function buildMenuItemHTML(shop, item) {
  const inCart = cart.some(c => c.itemId === item.id);
  const qty    = cart.find(c => c.itemId === item.id)?.qty || 0;
  const shopN  = JSON.stringify(shop.name);
  const itemN  = JSON.stringify(item.name);
  const imgSrc = JSON.stringify(item.image || '');

  return `
    <div class="menu-item" id="mi-${item.id}">
      ${item.image
        ? `<img class="menu-item-photo" src="${item.image}" alt="${item.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
           <div class="menu-item-photo-fallback" style="display:none">${item.emoji}</div>`
        : `<div class="menu-item-photo-fallback">${item.emoji}</div>`}
      <div class="menu-item-body">
        <div class="menu-item-top">
          <div class="menu-item-name">${item.name}</div>
          <div class="menu-item-price">RM ${Number(item.price).toFixed(2)}</div>
        </div>
        <div class="menu-item-desc">${item.desc}</div>
        <div class="menu-item-actions${inCart ? ' in-cart' : ''}" id="mia-${item.id}">
          <button class="add-btn" onclick="addToCart('${shop.id}','${item.id}',${shopN},${itemN},${item.price},'${item.emoji}',${imgSrc})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Add to Cart
          </button>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
            <span class="qty-val" id="qty-${item.id}">${qty}</span>
            <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
          </div>
        </div>
      </div>
    </div>`;
}

function syncMenuStates() {
  // After re-renders, sync the in-cart state on menu items
  shops.forEach(shop => {
    (shop.menu || []).forEach(item => {
      const actions = document.getElementById('mia-' + item.id);
      const qtyEl   = document.getElementById('qty-'  + item.id);
      if (!actions) return;
      const ci = cart.find(c => c.itemId === item.id);
      if (ci) {
        actions.classList.add('in-cart');
        if (qtyEl) qtyEl.textContent = ci.qty;
      } else {
        actions.classList.remove('in-cart');
        if (qtyEl) qtyEl.textContent = 0;
      }
    });
  });
}

function toggleShop(id) {
  document.getElementById('shop-' + id).classList.toggle('open');
}

/* ── CART LOGIC ── */
function addToCart(shopId, itemId, shopName, itemName, price, emoji, image) {
  if (!cart.some(c => c.itemId === itemId)) {
    cart.push({ shopId, itemId, shopName, itemName, price: Number(price), emoji, image, qty: 1 });
    saveCart(); updateBadge(); syncMenuStates();
    showToast('Added to cart 🛒');
  }
}

function changeQty(itemId, delta) {
  const idx = cart.findIndex(c => c.itemId === itemId);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) {
    cart.splice(idx, 1);
  }
  saveCart(); updateBadge(); syncMenuStates();
  // update qty display on menu card
  const qtyEl = document.getElementById('qty-' + itemId);
  const mia   = document.getElementById('mia-' + itemId);
  const ci = cart.find(c => c.itemId === itemId);
  if (qtyEl) qtyEl.textContent = ci ? ci.qty : 0;
  if (mia)   ci ? mia.classList.add('in-cart') : mia.classList.remove('in-cart');
}

function updateBadge() {
  const total = cart.reduce((s, c) => s + c.qty, 0);
  const badge = document.getElementById('cart-badge');
  badge.textContent = total;
  badge.classList.toggle('show', total > 0);
}

function removeFromCart(itemId) {
  cart = cart.filter(c => c.itemId !== itemId);
  saveCart(); updateBadge(); syncMenuStates(); renderCart();
}

/* ── RENDER CART ── */
function renderCart() {
  paymentFile = null; // reset attachment when re-rendering
  const container = document.getElementById('cart-content');
  if (!cart.length) {
    container.innerHTML = `<div class="cart-empty"><div class="big">🛒</div><p>Your cart is empty.<br>Browse shops to add items!</p></div>`;
    return;
  }
  const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const delivery = 1.50;
  const total    = subtotal + delivery;

  // Build QR section
  const qrSection = QR_IMAGE
    ? `<div class="qr-img-wrap"><img src="${QR_IMAGE}" alt="Payment QR" /></div>`
    : `<div class="qr-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"/>
        </svg>
        <span>Set QR_IMAGE in code</span>
      </div>`;

  container.innerHTML = `
    ${cart.map(ci => `
      <div class="cart-item">
        <div class="cart-item-img">
          ${ci.image
            ? `<img src="${ci.image}" alt="${ci.itemName}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="fb" style="display:none">${ci.emoji}</div>`
            : `<div class="fb">${ci.emoji}</div>`}
        </div>
        <div class="cart-item-body">
          <div class="cart-item-info">
            <div class="cart-item-name">${ci.itemName}</div>
            <div class="cart-item-meta">${ci.shopName} · qty ${ci.qty}</div>
          </div>
          <div class="cart-item-right">
            <div class="cart-item-price">RM ${(ci.price * ci.qty).toFixed(2)}</div>
            <button class="cart-item-remove" onclick="removeFromCart('${ci.itemId}')">Remove</button>
          </div>
        </div>
      </div>
    `).join('')}

    <div class="cart-summary">
      <div class="cart-row"><span>Subtotal</span><span>RM ${subtotal.toFixed(2)}</span></div>
      <div class="cart-row"><span>Runner Fee</span><span>RM ${delivery.toFixed(2)}</span></div>
      <div class="cart-row total"><span>Total</span><span>RM ${total.toFixed(2)}</span></div>
    </div>

    <div class="order-form">
      <h3>📋 Your Details</h3>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="order-name" placeholder="e.g. Ahmad Zulkifli" />
      </div>
      <div class="form-group">
        <label>WhatsApp Number</label>
        <input type="tel" id="order-wa" placeholder="e.g. 0123456789" />
      </div>
      <div class="form-group">
        <label>Delivery Location</label>
        <input type="text" id="order-loc" placeholder="e.g. Block A Room 312 / Library" />
      </div>
      <div class="form-group">
        <label>Note to Runner (optional)</label>
        <textarea id="order-note" placeholder="e.g. No spicy, extra sauce..."></textarea>
      </div>

      <!-- QR PAYMENT -->
      <div class="qr-box">
        <div class="qr-label">💳 Payment</div>
        ${qrSection}
        <div class="qr-sublabel">
          Please transfer <strong style="color:var(--accent)">RM ${total.toFixed(2)}</strong> to this QR code,<br>
          then attach your payment screenshot below.
        </div>
      </div>

      <!-- ATTACHMENT -->
      <div class="form-group">
        <label>Payment Screenshot</label>
        <div class="attach-area" id="attach-area" onclick="document.getElementById('file-input').click()">
          <input type="file" id="file-input" accept="image/*" onchange="handleAttachment(event)" onclick="event.stopPropagation()" />
          <div class="attach-icon">📎</div>
          <div class="attach-label" id="attach-label">Tap to attach screenshot</div>
          <img class="attach-preview" id="attach-preview" alt="preview" />
        </div>
      </div>

      <button class="order-btn" onclick="placeOrder()">🚀 Place Order</button>
    </div>
  `;
}

/* ── ATTACHMENT HANDLER ── */
function handleAttachment(e) {
  const file = e.target.files[0];
  if (!file) return;
  paymentFile = file;
  const area    = document.getElementById('attach-area');
  const label   = document.getElementById('attach-label');
  const preview = document.getElementById('attach-preview');
  area.classList.add('has-file');
  label.textContent = '✅ ' + file.name;
  label.classList.add('ready');
  const reader = new FileReader();
  reader.onload = ev => {
    preview.src = ev.target.result;
    preview.classList.add('show');
  };
  reader.readAsDataURL(file);
}

/* ── PLACE ORDER ── */
async function placeOrder() {
  const name = document.getElementById('order-name')?.value.trim();
  const wa   = document.getElementById('order-wa')?.value.trim();
  const loc  = document.getElementById('order-loc')?.value.trim();
  const note = document.getElementById('order-note')?.value.trim();

  if (!name) { showToast('Please enter your name ✏️', true); return; }
  if (!wa)   { showToast('Please enter your WhatsApp number 📱', true); return; }
  if (!loc)  { showToast('Please enter your delivery location 📍', true); return; }
  if (!paymentFile) {
    showToast('Please attach your payment screenshot 📸', true);
    // highlight the attach area
    const area = document.getElementById('attach-area');
    if (area) { area.style.borderColor = 'var(--accent2)'; setTimeout(() => area.style.borderColor = '', 2000); }
    return;
  }

  const btn = document.querySelector('.order-btn');
  btn.disabled = true; btn.textContent = '⏳ Sending...';

  const subtotal  = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const total     = subtotal + 1.50;
  const orderId   = 'MIC-' + Date.now().toString(36).toUpperCase();
  const itemsList = cart.map(c => `• ${c.emoji} ${c.itemName} ×${c.qty} — RM ${(c.price*c.qty).toFixed(2)} (${c.shopName})`).join('\n');

  try {
    if (DISCORD_WEBHOOK !== "YOUR_DISCORD_WEBHOOK_URL") {
      // Send embed first
      const embedPayload = {
        username: "Micor Orders 🛵",
        embeds: [{
          title: `🆕 New Order — ${orderId}`,
          color: 0xf0c040,
          fields: [
            { name: "👤 Student Name",             value: name,                     inline: true  },
            { name: "📱 WhatsApp",                 value: wa,                       inline: true  },
            { name: "📍 Delivery Location",        value: loc,                      inline: false },
            { name: "🛒 Items Ordered",            value: itemsList,                inline: false },
            { name: "💰 Total (incl. runner fee)", value: `RM ${total.toFixed(2)}`, inline: true  },
            ...(note ? [{ name: "📝 Note", value: note, inline: false }] : [])
          ],
          footer: { text: `Micor Student Delivery • ${new Date().toLocaleString()}` }
        }]
      };
      await fetch(DISCORD_WEBHOOK, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(embedPayload)
      });

      // Send screenshot as a file attachment
      const form = new FormData();
      form.append('file', paymentFile, `payment-${orderId}.${paymentFile.name.split('.').pop()}`);
      form.append('payload_json', JSON.stringify({
        username: "Micor Orders 🛵",
        content: `💳 **Payment Screenshot** for order **${orderId}** — ${name} (${wa})`
      }));
      await fetch(DISCORD_WEBHOOK, { method: 'POST', body: form });
    } else {
      await new Promise(r => setTimeout(r, 1000)); // demo delay
    }

    history.unshift({ id: orderId, date: new Date().toLocaleString(), name, wa, loc, note, items: [...cart], total });
    saveHistory();
    cart = []; paymentFile = null; saveCart(); updateBadge(); syncMenuStates();
    document.getElementById('success-overlay').classList.add('show');
  } catch (err) {
    console.error(err);
    showToast('Failed to send order. Try again!', true);
    btn.disabled = false; btn.textContent = '🚀 Place Order';
  }
}

function closeSuccess() {
  document.getElementById('success-overlay').classList.remove('show');
  switchTab('home');
}

/* ── RENDER HISTORY ── */
function renderHistory() {
  const container = document.getElementById('history-content');
  if (!history.length) {
    container.innerHTML = `<div class="history-empty"><div class="big">📦</div><p>No orders yet.<br>Place your first order!</p></div>`;
    return;
  }
  container.innerHTML = history.map(h => `
    <div class="history-card">
      <div class="history-top">
        <div>
          <div class="history-id">${h.id}</div>
          <div class="history-date">${h.date}</div>
        </div>
        <div class="history-status status-sent">Sent ✓</div>
      </div>
      <div class="history-thumbs">
        ${h.items.map(i => i.image
          ? `<img class="history-thumb" src="${i.image}" alt="${i.itemName}" onerror="this.outerHTML='<div class=history-thumb-emoji>${i.emoji}</div>'" />`
          : `<div class="history-thumb-emoji">${i.emoji}</div>`
        ).join('')}
      </div>
      <div class="history-items">${h.items.map(i => `${i.itemName} ×${i.qty}`).join(' · ')}</div>
      <div class="history-total">Total: <span>RM ${h.total.toFixed(2)}</span></div>
    </div>
  `).join('');
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 2400);
}

/* ── INIT ── */
loadShops();
updateBadge();
</script>
</body>
</html>
